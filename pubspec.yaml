name: flutter_security_detection
description: Enterprise-grade Frida, jailbreak, root, emulator, and hook detection for Flutter with go_router integration.
version: 0.1.0
homepage: https://github.com/aliawami/flutter_security_detection
repository: https://github.com/aliawami/flutter_security_detection
issue_tracker: https://github.com/aliawami/flutter_security_detection/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5

flutter:
  plugin:
    platforms:
      android:
        package: com.aliAlawami.flutter_security_detection
        pluginClass: FlutterSecurityDetectionPlugin
      ios:
        pluginClass: FlutterSecurityDetectionPlugin
