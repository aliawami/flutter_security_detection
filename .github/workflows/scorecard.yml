name: OpenSSF Scorecard

on:
  # Run on every push to main
  push:
    branches: [main]
  # Run weekly to catch supply-chain regressions
  schedule:
    - cron: '30 1 * * 1'   # every Monday at 01:30 UTC
  # Allow manual trigger
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for publishing results to the Security tab
      security-events: write
      # Required by the scorecard action to read the repo
      contents: read
      # Required for OIDC token to publish results to deps.dev
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to securityscorecards.dev (requires id-token above)
          publish_results: true

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
