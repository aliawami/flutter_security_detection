name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Dart / Flutter ────────────────────────────────────────────────────────
  analyze-dart:
    name: CodeQL — Dart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: dart

      # Dart is compiled by 'flutter pub get'; no separate build step needed
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:dart

  # ── Kotlin (Android plugin) ───────────────────────────────────────────────
  analyze-kotlin:
    name: CodeQL — Kotlin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: kotlin

      - name: Autobuild (Gradle)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:kotlin

  # ── Swift (iOS plugin) ────────────────────────────────────────────────────
  analyze-swift:
    name: CodeQL — Swift
    runs-on: macos-latest   # Swift requires macOS; free for public repos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter (needed to generate iOS build files)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Flutter iOS build files
        working-directory: example
        run: |
          flutter pub get
          flutter build ios --no-codesign --simulator 2>/dev/null || true

      - name: Install CocoaPods dependencies
        working-directory: example/ios
        run: pod install --repo-update

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      # Build only the plugin's Swift sources via the example workspace
      - name: Build Swift plugin (no code signing)
        working-directory: example/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:swift
